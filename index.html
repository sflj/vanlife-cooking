<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d4af37">
    <title>tinyCHEF</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 id="ui-title"></h1>
        <span class="filter-toggle" id="filter-btn">⚙️</span>
    </header>

    <div class="filter-panel" id="filter-panel">
        <div class="sort-section">
            <button class="sort-btn active" id="sort-name" onclick="setSort('name', this)">A-Z</button>
            <button class="sort-btn" onclick="setSort('energy', this)">❤️</button>
            <button class="sort-btn" onclick="setSort('prepTime', this)">⏱️</button>
            <button class="sort-btn" onclick="setSort('difficulty', this)">👨‍🍳</button>
            <label class="vege-toggle">
                <div class="switch">
                    <input type="checkbox" id="vege-only">
                    <span class="slider"></span>
                </div>
                <span id="ui-vege-label"></span>
            </label>
        </div>

        <div class="filter-scroll-area" id="filter-accordion-container"></div>

        <div class="filter-footer">
            <button id="apply-filters"></button>
        </div>
    </div>

    <main id="recipe-list"></main>

    <div class="modal-backdrop" id="recipe-modal">
        <div class="close-modal-btn" id="close-modal-btn">&times;</div>
        <div id="modal-card-container" class="modal-card"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW OK:', reg.scope))
                    .catch(err => console.error('SW Błąd:', err));
            });
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
