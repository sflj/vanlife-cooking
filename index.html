<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanLife RPG Tool</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #88a05e;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #recipe-container {
            width: 90%;
            max-width: 400px;
            height: 450px;
            display: flex;
            /* Włączamy normalny scroll palcem */
            overflow-x: auto; 
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border: 2px solid #333;
            border-radius: 15px;
            background: var(--card-bg);
            -webkit-overflow-scrolling: touch;
        }

        /* Ukrywamy scrollbar dla estetyki */
        #recipe-container::-webkit-scrollbar { display: none; }

        .step {
            min-width: 100%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .icon-recipe { font-size: 80px; margin-bottom: 20px; }

        #sensor-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            font-size: 10px;
            background: #333;
            color: #888;
            border: 1px solid #444;
            border-radius: 5px;
            z-index: 1000;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 0.7rem;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <button id="sensor-btn" onclick="requestAccess()">AKTYWUJ SENSORY (TAP)</button>

    <div id="recipe-container">
        <div class="step">
            <div class="icon-recipe">🪵+🧶</div>
            <p>CRAFTING: Suszarka na pranie</p>
            <p style="font-size: 0.8rem">Puknij telefon w bok -></p>
        </div>
        <div class="step">
            <div class="icon-recipe">🧪+💧</div>
            <p>CRAFTING: Uzdatnianie wody</p>
        </div>
        <div class="step">
            <div class="icon-recipe">🔋+☀️</div>
            <p>SYSTEM: Solar Optimization</p>
        </div>
    </div>

    <div class="status-msg" id="debug">System: Czekam na aktywację</div>

    <script>
        const container = document.getElementById('recipe-container');
        const debug = document.getElementById('debug');
        let isThrottled = false;

        // Funkcja przewijania
        function scrollNext() {
            if (isThrottled) return;
            isThrottled = true;

            const cardWidth = container.offsetWidth;
            const maxScroll = container.scrollWidth - cardWidth;
            
            // Jeśli jesteśmy na końcu, wróć do początku
            if (container.scrollLeft >= maxScroll - 5) {
                container.scrollTo({ left: 0, behavior: 'smooth' });
            } else {
                container.scrollBy({ left: cardWidth, behavior: 'smooth' });
            }

            debug.innerText = "Wykryto TAP! Przewijam...";
            setTimeout(() => { isThrottled = false; }, 800);
        }

        function requestAccess() {
            // Obsługa iOS
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startMotion();
                    });
            } else {
                startMotion();
            }
            document.getElementById('sensor-btn').style.display = 'none';
        }

        function startMotion() {
            window.addEventListener('devicemotion', (event) => {
                // Wyciągamy przyspieszenie z osi X (boki telefonu)
                const acc = event.acceleration;
                if (!acc) return;

                // Czułość uderzenia (zależna od telefonu, 10-15 jest ok)
                const threshold = 2; 

                if (Math.abs(acc.x) > threshold || Math.abs(acc.y) > threshold) {
                    scrollNext();
                }
            });
            debug.innerText = "Sensory aktywne. Puknij w bok telefonu.";
        }
    </script>
</body>
</html>
