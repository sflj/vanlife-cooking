<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanLife RPG Chef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #f0f0f0;
            --text-dim: #aaa;
            --type-default: #2a2825;
            --type-vege: #2d3524;
            --type-fish: #242d35;
            --accent-gold: #c5a059;
            --header-h: 52px;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Lato', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: var(--header-h);
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-h);
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        .filter-toggle {
            position: absolute;
            right: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            padding: 5px;
        }

        /* --- FILTER PANEL --- */
        .filter-panel {
            display: none;
            position: fixed;
            top: var(--header-h);
            width: 100%;
            height: calc(100vh - var(--header-h));
            background: #111;
            border-bottom: 1px solid #333;
            padding: 15px;
            box-sizing: border-box;
            flex-direction: column;
            gap: 15px;
            z-index: 90;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .filter-panel.visible { display: flex; }

        .sort-section {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            padding-bottom: 5px;
        }

        .sort-btn {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .sort-btn.active {
            border-color: var(--accent-gold);
            background: #333;
        }

        .filter-scroll-area {
            flex: 1; 
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        details {
            width: 100%;
            background: #161616;
            border-radius: 8px;
            border: 1px solid #222;
        }

        summary {
            padding: 12px;
            cursor: pointer;
            color: var(--accent-gold);
            font-weight: bold;
            list-style: none;
            font-size: 0.9rem;
            user-select: none;
        }

        .category-container {
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid #222;
        }

        .ingredient-chip {
            padding: 6px 12px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: capitalize;
        }

        .ingredient-chip.active {
            background: var(--type-vege);
            border-color: var(--accent-gold);
        }

        .ingredient-chip.tool-active {
            background: var(--accent-gold);
            color: black;
            border-color: white;
            font-weight: bold;
        }

        .filter-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #222;
        }

        /* --- RECIPE GRID --- */
        #recipe-list {
            width: 100%;
            max-width: 1200px;
            padding: 20px 15px 40px 15px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .recipe-card {
            border: 1px solid #444;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            height: fit-content;
        }

        .card-header { padding: 12px; text-align: center; }
        .recipe-name { font-size: 1.1rem; color: var(--accent-gold); }
        .result-icon { font-size: 4rem; height: 85px; display: flex; align-items: center; justify-content: center; }
        .ingredients-row { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px; font-size: 1.6rem; background: rgba(0,0,0,0.1); padding: 8px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
        .plus { font-size: 0.8rem; color: var(--text-dim); }
        
        .card-footer {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.75rem;
        }

        .footer-center { text-align: center; color: var(--text-dim); font-weight: bold; }
        .footer-right { text-align: right; }
        .card-vege { background-color: var(--type-vege); border-color: #4a5d23; }
        .card-fish { background-color: var(--type-fish); border-color: #3b5a6b; }
        .card-default { background-color: var(--type-default); border-color: #444; }
        .energy-val, .diff-val { letter-spacing: 2px; }
        .energy-val { color: #ff5f5f; }
        .diff-val { color: #ffd700; }

        #apply-filters {
            padding: 10px 25px;
            background: var(--accent-gold);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="ui-title">Campfire Deck</h1>
        <span class="filter-toggle" id="filter-btn">⚙️</span>
    </header>

    <div class="filter-panel" id="filter-panel">
        <div class="sort-section">
            <button class="sort-btn active" id="sort-name" onclick="setSort('name', this)">A-Z</button>
            <button class="sort-btn" onclick="setSort('energy', this)">❤️</button>
            <button class="sort-btn" onclick="setSort('prepTime', this)">⏱️</button>
            <button class="sort-btn" onclick="setSort('difficulty', this)">👨‍🍳</button>
        </div>

        <div class="filter-scroll-area" id="filter-accordion-container"></div>

        <div class="filter-footer">
            <label style="cursor: pointer; font-size: 0.85rem; user-select: none;">
                <input type="checkbox" id="vege-only"> <span id="ui-vege-label">🌿 Tylko Vege</span>
            </label>
            <button id="apply-filters">Zastosuj</button>
        </div>
    </div>

    <div id="recipe-list"></div>

    <script>
        const categoriesMap = {
            "vege_fruit": ["onion", "tomatoes", "pepper", "zucchini", "mushroom", "lettuce", "garlic", "potato", "carrot", "lemon"],
            "proteins": ["egg", "chicken", "beef", "bacon", "sausage", "fish", "ham", "tuna"],
            "dairy": ["cheese", "milk", "butter"],
            "others": ["pasta", "bread", "water", "sugar", "flour", "oil"]
        };

        let translations = {};
        let allRecipes = [];
        let selectedIngredients = new Set();
        let selectedToolIcon = null; 
        let currentSort = 'name';

        const filterBtn = document.getElementById('filter-btn');
        const filterPanel = document.getElementById('filter-panel');
        const recipeList = document.getElementById('recipe-list');
        const accordionContainer = document.getElementById('filter-accordion-container');

        filterBtn.onclick = () => filterPanel.classList.toggle('visible');

        // Funkcja tłumacząca
        function t(key, section = 'items') {
            return (translations[section] && translations[section][key]) ? translations[section][key] : key;
        }

        async function initApp() {
            // 1. Wykrywanie języka i ładowanie JSON
            const userLang = navigator.language.split('-')[0];
            const supported = ['pl', 'en', 'de'];
            const langToLoad = supported.includes(userLang) ? userLang : 'pl';

            try {
                const langRes = await fetch(`lang_${langToLoad}.json`);
                translations = await langRes.json();
            } catch (e) {
                const fallback = await fetch(`lang_pl.json`);
                translations = await fallback.json();
            }

            // 2. Aktualizacja UI statycznego
            document.getElementById('ui-title').textContent = t('title', 'ui');
            document.getElementById('ui-vege-label').textContent = t('vege_only', 'ui');
            document.getElementById('apply-filters').textContent = t('filter_btn', 'ui');

            // 3. Ładowanie przepisów
            await fetchRecipes();
        }

        async function fetchRecipes() {
            try {
                const response = await fetch(`recipes.json?t=${new Date().getTime()}`);
                allRecipes = await response.json();
                generateFilters(allRecipes);
                applyAndRender();
            } catch (err) {
                recipeList.innerHTML = "Error loading recipes.";
            }
        }

        function generateFilters(recipes) {
            const toolsData = new Map(); // icon -> name(item)
            const ingredientsMap = new Map();

            recipes.forEach(r => {
                r.mainIngredients.forEach(i => ingredientsMap.set(i.item, i.icon));
                if(r.tools) {
                    r.tools.forEach(t => toolsData.set(t.icon, t.item));
                }
            });

            accordionContainer.innerHTML = '';

            // --- SPRZĘT ---
            const toolDet = document.createElement('details');
            toolDet.open = true;
            const toolSum = document.createElement('summary');
            toolSum.textContent = t('tool_header', 'ui');
            toolDet.appendChild(toolSum);

            const toolCont = document.createElement('div');
            toolCont.className = 'category-container';

            toolsData.forEach((itemName, icon) => {
                const chip = document.createElement('div');
                chip.className = 'ingredient-chip';
                chip.innerHTML = `${icon} ${t(itemName)}`;
                chip.onclick = () => {
                    const isAlreadySelected = chip.classList.contains('tool-active');
                    toolCont.querySelectorAll('.ingredient-chip').forEach(c => c.classList.remove('tool-active'));
                    if (isAlreadySelected) {
                        selectedToolIcon = null;
                    } else {
                        chip.classList.add('tool-active');
                        selectedToolIcon = icon;
                    }
                };
                toolCont.appendChild(chip);
            });
            toolDet.appendChild(toolCont);
            accordionContainer.appendChild(toolDet);

            // --- SKŁADNIKI ---
            for (const [catKey, items] of Object.entries(categoriesMap)) {
                const det = document.createElement('details');
                const sum = document.createElement('summary');
                sum.textContent = t(catKey, 'categories');
                det.appendChild(sum);

                const cont = document.createElement('div');
                cont.className = 'category-container';

                items.forEach(itemName => {
                    const icon = ingredientsMap.get(itemName);
                    if (!icon) return;

                    const chip = document.createElement('div');
                    chip.className = 'ingredient-chip';
                    chip.innerHTML = `${icon} ${t(itemName)}`;
                    chip.onclick = () => {
                        chip.classList.toggle('active');
                        selectedIngredients.has(itemName) ? selectedIngredients.delete(itemName) : selectedIngredients.add(itemName);
                    };
                    cont.appendChild(chip);
                });

                if (cont.children.length > 0) {
                    det.appendChild(cont);
                    accordionContainer.appendChild(det);
                }
            }
        }

        function setSort(type, btn) {
            currentSort = type;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyAndRender();
        }

        document.getElementById('apply-filters').onclick = () => {
            applyAndRender();
            filterPanel.classList.remove('visible');
        };

        function applyAndRender() {
            const vege = document.getElementById('vege-only').checked;

            let filtered = allRecipes.filter(r => {
                const tMatch = !selectedToolIcon || (r.tools && r.tools.some(t => t.icon === selectedToolIcon));
                const vMatch = !vege || r.tags.includes('vege');
                const rIngs = r.mainIngredients.map(i => i.item);
                const iMatch = Array.from(selectedIngredients).every(name => rIngs.includes(name));
                return tMatch && vMatch && iMatch;
            });

            filtered.sort((a, b) => {
                if (currentSort === 'name') return a.name.localeCompare(b.name);
                if (currentSort === 'energy') return b.energy - a.energy;
                if (currentSort === 'prepTime') return a.prepTime - b.prepTime;
                if (currentSort === 'difficulty') return a.difficulty - b.difficulty;
            });

            renderDeck(filtered);
        }

        function renderDeck(recipes) {
            recipeList.innerHTML = '';
            recipes.forEach(r => {
                const card = document.createElement('div');
                let typeClass = 'card-default';
                if (r.tags.includes('vege')) typeClass = 'card-vege';
                else if (r.tags.includes('fish')) typeClass = 'card-fish';
                card.className = `recipe-card ${typeClass}`;

                const icons = [...r.mainIngredients.map(i => i.icon), ...(r.tools ? r.tools.map(t => t.icon) : [])];
                
                card.innerHTML = `
                    <div class="card-header"><span class="recipe-name">${r.name}</span></div>
                    <div class="card-body">
                        <div class="result-icon">${r.resultIcon}</div>
                        <div class="ingredients-row">${icons.map(i => `<span>${i}</span>`).join('<span class="plus">+</span>')}</div>
                    </div>
                    <div class="card-footer">
                        <div class="footer-left"><span class="diff-val">${"👨‍🍳".repeat(r.difficulty)}</span></div>
                        <div class="footer-center">⏱️ ${r.prepTime} ${t('prep_time', 'ui')}</div>
                        <div class="footer-right"><span class="energy-val">${"❤️".repeat(r.energy)}</span></div>
                    </div>
                `;
                recipeList.appendChild(card);
            });
        }

        // Start
        initApp();
    </script>
</body>
</html>
