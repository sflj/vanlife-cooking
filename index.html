<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="tinyCHEF">
    <title>tinyCHEF</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <svg style="display: none;">
      <symbol id="icon-filter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/>
      </symbol>
    
      <symbol id="icon-sort" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="M20 8h-5"/><path d="M15 10V6.5a2.5 2.5 0 0 1 5 0V10"/><path d="M15 14h5l-5 6h5"/>
      </symbol>
    
      <symbol id="icon-time" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </symbol>
    
      <symbol id="icon-chef" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21a1 1 0 0 0 1-1v-5.35c0-.457.316-.844.727-1.041a4 4 0 0 0-2.134-7.589 5 5 0 0 0-9.186 0 4 4 0 0 0-2.134 7.588c.411.198.727.585.727 1.041V20a1 1 0 0 0 1 1Z"/><path d="M6 17h12"/>
      </symbol>
    
      <symbol id="icon-energy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
      </symbol>

      <symbol id="icon-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m6 9 6 6 6-6"/>
      </symbol>
    </svg>

    
    <div class="app-layout">
        <div class="main-wrapper">
            <header>
                <h1 id="ui-title"></h1>
                <span class="filter-toggle" id="filter-btn">
                    <svg class="svg-icon icon-filter"><use href="#icon-filter"></use></svg>
                </span>
            </header>
            
            <main>
                <div id="recipe-list"></div>
            </main>
        </div>
        
        <aside class="filter-panel" id="filter-panel">
            <header>
                <h2 id="ui-filter-title">Filtry</h2>
                <span class="close-filter" id="close-filter-btn">
                    <svg class="svg-icon"><use href="#icon-chevron"></use></svg>
                </span>
            </header>
            
            <div class="sort-section">
                <button class="sort-btn active" id="sort-name" onclick="setSort('name', this)">
                    <svg class="svg-icon icon-sort"><use href="#icon-sort"></use></svg>
                </button>
                <button class="sort-btn" onclick="setSort('energy', this)">
                    <svg class="svg-icon icon-energy"><use href="#icon-energy"></use></svg>
                </button>
                <button class="sort-btn" onclick="setSort('prepTime', this)">
                    <svg class="svg-icon icon-time"><use href="#icon-time"></use></svg>
                </button>
                <button class="sort-btn" onclick="setSort('difficulty', this)">
                    <svg class="svg-icon icon-chef"><use href="#icon-chef"></use></svg>
                </button>
                <label class="vege-toggle">
                    <div class="switch">
                        <input type="checkbox" id="vege-only">
                        <span class="slider"></span>
                    </div>
                    <span id="ui-vege-label"></span>
                </label>
            </div>
    
            <div class="filter-scroll-area" id="filter-accordion-container"></div>
    
            <div class="filter-footer">
                <button id="apply-filters"></button>
            </div>
        </aside>
    </div>

    <div class="modal-backdrop" id="recipe-modal">
        <div class="close-modal-btn" id="close-modal-btn">&times;</div>
        <div id="modal-card-container" class="modal-card"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW OK:', reg.scope))
                    .catch(err => console.error('SW Błąd:', err));
            });
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
