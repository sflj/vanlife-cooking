<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanLife RPG Chef</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #f0f0f0;
            --text-dim: #aaa;
            --type-default: #2a2825;
            --type-vege: #2d3524;
            --type-fish: #242d35;
            --accent-gold: #c5a059;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background: #111;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--accent-gold);
        }

        #recipe-list {
            width: 100%;
            max-width: 400px;
            padding: 10px 15px 40px 15px;
            box-sizing: border-box;
        }

        .recipe-card {
            border: 1px solid #444;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .card-header {
            padding: 12px 12px 8px 12px;
            display: flex;
            justify-content: center;
            background: transparent;
        }

        .recipe-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-body {
            /* padding: 10px 10px 25px 10px; */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* gap: 15px; */
        }

        /* (a) Usunięte line-height */
        .result-icon {
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 85px; 
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .ingredients-row {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap; /* Pozwala zawijać ikony, jeśli jest ich dużo */
            gap: 6px;
            font-size: 1.6rem;
            background: rgba(0,0,0,0.1);
            padding: 8px 16px;
            /* border-radius: 20px; */
            border-top: 1px solid rgba(255,255,255,0.05);
            width: 100%;
        }

        .plus { font-size: 0.8rem; color: var(--text-dim); }

        .card-footer {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr; /* Środek nieco szerszy na "X min" */
            align-items: center;
            padding: 10px 12px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.75rem;
        }

        .footer-center {
            text-align: center;
            color: var(--text-dim);
            white-space: nowrap;
            font-weight: bold;
        }

        .footer-right { text-align: right; }

        .card-vege { background-color: var(--type-vege); border-color: #4a5d23; }
        .card-fish { background-color: var(--type-fish); border-color: #3b5a6b; }
        .card-default { background-color: var(--type-default); border-color: #444; }

        .energy-val { 
            color: #ff5f5f; 
            letter-spacing: 2px; /* Odstęp między serduszkami */
        }
        
        .diff-val { 
            color: #ffd700; 
            letter-spacing: 2px; /* Odstęp między gwiazdkami */
        }
    </style>
</head>
<body>

    <header>
        <h1>CAMPFIRE DECK</h1>
    </header>

    <div id="recipe-list"></div>

    <script>
    const recipeList = document.getElementById('recipe-list');

    async function fetchRecipes() {
        try {
            // (b) Dodanie timestampu, aby ominąć cache przeglądarki
            const cacheBuster = new Date().getTime();
            const response = await fetch(`recipes.json?t=${cacheBuster}`);
            
            if (!response.ok) throw new Error('Baza nieosiągalna.');
            const recipes = await response.json();
            renderDeck(recipes);
        } catch (err) {
            recipeList.innerHTML = `<div style="padding:20px; text-align:center;">BŁĄD: ${err.message}</div>`;
        }
    }

    function renderDeck(recipes) {
        recipeList.innerHTML = '';

        recipes.forEach(recipe => {
            const card = document.createElement('div');
            
            let typeClass = 'card-default';
            if (recipe.tags.includes('vege')) typeClass = 'card-vege';
            else if (recipe.tags.includes('fish')) typeClass = 'card-fish';
            
            card.className = `recipe-card ${typeClass}`;

            const mainIcons = recipe.mainIngredients.map(ing => ing.icon);
            const toolIcons = recipe.tools ? recipe.tools.map(t => t.icon) : [];
            const allIcons = [...mainIcons, ...toolIcons];
            
            const ingredientsHTML = allIcons
                .map(icon => `<span>${icon}</span>`)
                .join('<span class="plus">+</span>');

            card.innerHTML = `
                <div class="card-header">
                    <span class="recipe-name">${recipe.name}</span>
                </div>
                
                <div class="card-body">
                    <div class="result-icon">${recipe.resultIcon}</div>
                    <div class="ingredients-row">
                        ${ingredientsHTML}
                    </div>
                </div>

                <div class="card-footer">
                    <div class="footer-left">
                        <span class="diff-val">${"⭐".repeat(recipe.difficulty)}</span>
                    </div>
                    <div class="footer-center">
                        ⏱️ ${recipe.prepTime} min
                    </div>
                    <div class="footer-right">
                        <span class="energy-val">${"❤️".repeat(recipe.energy)}</span>
                    </div>
                </div>
            `;
            
            recipeList.appendChild(card);
        });
    }

    fetchRecipes();
</script>
</body>
</html>
