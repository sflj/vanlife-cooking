<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanLife RPG Chef</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #f0f0f0;
            --text-dim: #aaa;
            /* Kolory typów kart */
            --type-default: #2a2825; /* Brązowo-szary (Mięso/Inne) */
            --type-vege: #2d3524;    /* Mszysty zielony (Vege) */
            --type-fish: #242d35;    /* Morski błękit (Ryby) */
            --accent-gold: #c5a059;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background: #111;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--accent-gold);
        }

        #recipe-list {
            width: 100%;
            max-width: 400px;
            padding: 10px 15px 40px 15px;
            box-sizing: border-box;
        }

        /* Styl Karty (Karcianka) */
        .recipe-card {
            border: 1px solid #444;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: transform 0.1s;
        }

        .recipe-card:active {
            transform: scale(0.98);
        }

        /* Paski: Nagłówek i Stopka karty */
        .card-bar {
            padding: 8px 12px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-header { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .card-footer { border-top: 1px solid rgba(255,255,255,0.05); }

        .recipe-name {
            font-weight: bold;
            color: var(--accent-gold);
        }

        /* Centralna sekcja wizualna */
        .card-body {
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .result-icon {
            font-size: 3.5rem;
            line-height: 1;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
        }

        .ingredients-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            background: rgba(0,0,0,0.2);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .plus { font-size: 0.9rem; color: var(--text-dim); }

        /* Klasy kolorystyczne */
        .card-vege { background-color: var(--type-vege); border-color: #4a5d23; }
        .card-fish { background-color: var(--type-fish); border-color: #3b5a6b; }
        .card-default { background-color: var(--type-default); border-color: #444; }

        .energy-val { color: #ff5f5f; letter-spacing: -2px; }
        .diff-val { color: #ffd700; }

        #error-msg {
            padding: 20px;
            text-align: center;
            color: #ff6b6b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>CAMPFIRE DECK</h1>
    </header>

    <div id="recipe-list">
        <div style="text-align:center; padding: 20px; color: var(--text-dim);">Wczytywanie zwojów...</div>
    </div>

    <script>
        const recipeList = document.getElementById('recipe-list');

        async function fetchRecipes() {
            try {
                // Pobieramy dane z zewnętrznego pliku
                const response = await fetch('recipes.json');
                
                if (!response.ok) throw new Error('Nie można wczytać bazy przepisów.');
                
                const recipes = await response.json();
                renderDeck(recipes);

            } catch (err) {
                recipeList.innerHTML = `<div id="error-msg">BŁĄD MAGII: ${err.message}<br><small>Uruchom stronę przez serwer lokalny!</small></div>`;
            }
        }

        function renderDeck(recipes) {
            recipeList.innerHTML = ''; // Czyścimy loader

            recipes.forEach(recipe => {
                const card = document.createElement('div');
                
                // Ustalanie typu karty
                let typeClass = 'card-default';
                if (recipe.tags.includes('vege')) typeClass = 'card-vege';
                else if (recipe.tags.includes('fish')) typeClass = 'card-fish';
                
                card.className = `recipe-card ${typeClass}`;

                // Budowanie rzędu składników
                const ingredientsHTML = recipe.mainIngredients
                    .map(ing => `<span>${ing.icon}</span>`)
                    .join('<span class="plus">+</span>');

                card.innerHTML = `
                    <div class="card-bar card-header">
                        <span class="recipe-name">${recipe.name}</span>
                        <span>⏱️${recipe.prepTime}m</span>
                    </div>
                    
                    <div class="card-body">
                        <div class="result-icon">${recipe.resultIcon}</div>
                        <div class="ingredients-row">
                            ${ingredientsHTML}
                        </div>
                    </div>

                    <div class="card-bar card-footer">
                        <span class="diff-val">${"⭐".repeat(recipe.difficulty)}</span>
                        <span class="energy-val">${"❤️".repeat(recipe.energy)}</span>
                    </div>
                `;
                
                recipeList.appendChild(card);
            });
        }

        // Start aplikacji
        fetchRecipes();
    </script>
</body>
</html>
