<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanLife RPG - Sensor Lab</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #88a05e;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding-top: 20px;
        }

        #recipe-container {
            width: 90%;
            max-width: 400px;
            height: 350px;
            display: flex;
            overflow-x: auto; 
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border: 2px solid #333;
            border-radius: 15px;
            background: var(--card-bg);
        }

        #recipe-container::-webkit-scrollbar { display: none; }

        .step {
            min-width: 100%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .icon-recipe { font-size: 60px; margin-bottom: 10px; }

        /* Logger Panel */
        #logger {
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border: 1px dashed var(--accent-color);
            font-size: 12px;
            color: #00ff00; /* Klasyczny terminalowy zielony */
        }

        .val { font-weight: bold; color: #fff; }

        #sensor-btn {
            padding: 15px;
            width: 90%;
            max-width: 400px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <button id="sensor-btn" onclick="requestAccess()">ODBLOKUJ SENSORY & LOGI</button>

    <div id="recipe-container">
        <div class="step">
            <div class="icon-recipe">🪵+🧶</div>
            <p>1. Suszarka na pranie</p>
        </div>
        <div class="step">
            <div class="icon-recipe">🧪+💧</div>
            <p>2. Uzdatnianie wody</p>
        </div>
        <div class="step">
            <div class="icon-recipe">🔋+☀️</div>
            <p>3. Optymalizacja Solara</p>
        </div>
        <div class="step">
            <div class="icon-recipe">🍲</div>
            <p>KONIEC LISTY</p>
        </div>
    </div>

    <div id="logger">
        <div>X (Boki): <span id="val-x" class="val">0</span></div>
        <div>Y (Góra/Dół): <span id="val-y" class="val">0</span></div>
        <hr style="border: 0.5px solid #333">
        <div>Max Peak: <span id="val-max" class="val">0</span></div>
        <div>Status: <span id="status-text">Czekam...</span></div>
    </div>

    <script>
        const container = document.getElementById('recipe-container');
        const debug = document.getElementById('status-text');
        const valX = document.getElementById('val-x');
        const valY = document.getElementById('val-y');
        const valMax = document.getElementById('val-max');

        let isThrottled = false;
        let maxPeak = 0;
        const THRESHOLD = 0.5; // Tutaj ustawiasz czułość

        function scrollNext() {
            if (isThrottled) return;

            const cardWidth = container.offsetWidth;
            const currentScroll = container.scrollLeft;
            const maxScroll = container.scrollWidth - cardWidth;
            
            // Logika bez zapętlania
            if (currentScroll < maxScroll - 10) {
                isThrottled = true;
                container.scrollBy({ left: cardWidth, behavior: 'smooth' });
                debug.innerText = "PRZEWINIĘTO!";
                setTimeout(() => { 
                    isThrottled = false; 
                    debug.innerText = "Gotowy na tapnięcie";
                }, 1000);
            } else {
                debug.innerText = "Ostatnia strona - stop.";
            }
        }

        function requestAccess() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startMotion();
                    });
            } else {
                startMotion();
            }
            document.getElementById('sensor-btn').style.background = '#333';
            document.getElementById('sensor-btn').innerText = "SENSORY AKTYWNE";
        }

        function startMotion() {
            window.addEventListener('devicemotion', (event) => {
                const acc = event.acceleration;
                if (!acc) return;

                // Pobieramy absolutne wartości (puknięcie to wektor ujemny lub dodatni)
                const x = Math.abs(acc.x || 0).toFixed(2);
                const y = Math.abs(acc.y || 0).toFixed(2);
                const currentMax = Math.max(x, y);

                // Update UI logów
                valX.innerText = x;
                valY.innerText = y;
                
                if (currentMax > maxPeak) {
                    maxPeak = currentMax;
                    valMax.innerText = maxPeak;
                }

                // Detekcja uderzenia
                if (currentMax > THRESHOLD) {
                    scrollNext();
                }
            });
            debug.innerText = "Nasłuchuję...";
        }
    </script>
</body>
</html>
